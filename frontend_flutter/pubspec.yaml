name: farmer_crop_app
description: Fieldworker App with Offline Sync for Agri Extension
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Network
  dio: ^5.3.3
  connectivity_plus: ^7.0.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Background Sync
  workmanager: ^0.9.0+3
  
  # UUID
  uuid: ^4.2.1
  
  # Location & Maps
  geolocator: ^14.0.2
  google_maps_flutter: ^2.5.0
  
  # Image
  image_picker: ^1.0.4
  
  # URL Launcher
  url_launcher: ^6.2.1
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
